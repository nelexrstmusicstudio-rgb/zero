<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Anime - Zero Anime</title>
  <style>
    /* General Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #2C2C2C;
      color: #FFE5B4;
    }
    
    .container {
      display: flex;
      max-width: 1400px;
      width: 100%;
      margin-top: 70px;
      gap: 0;
      box-shadow: 0 0 20px rgba(255, 229, 180, 0.3);
      border-radius: 15px;
    }
    
    /* Header - Transparent like index.html */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: transparent;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      transition: background 0.3s ease;
    }
    
    .header.scrolled {
      background: rgba(44, 44, 44, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    /* Logo Text - Like index.html */
    .logo-text {
      font-size: 1.5rem;
      font-weight: bold;
      text-decoration: none;
    }
    
    .logo-text .zero {
      color: #FFE5B4;
    }
    
    .logo-text .anime {
      color: #FFFFFF;
    }
    
    /* Settings Button (Three Lines) - White */
    .settings-button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 1002;
    }
    
    .settings-button span {
      width: 24px;
      height: 3px;
      background-color: #FFFFFF;
      border-radius: 2px;
      transition: 0.3s;
    }
    
    .settings-button:hover span {
      background-color: rgba(255, 255, 255, 0.7);
    }
    
    /* Search Bar */
    .search-bar {
      width: 200px;
      padding: 8px 15px;
      border: 2px solid #FFE5B4;
      border-radius: 20px;
      background-color: rgba(255, 255, 255, 0.08);
      color: #FFE5B4;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .search-bar::placeholder {
      color: rgba(255, 229, 180, 0.5);
      font-style: italic;
      opacity: 0.7;
    }
    
    .search-bar:focus {
      border-color: #FFE5B4;
      box-shadow: 0 0 10px rgba(255, 229, 180, 0.8);
      background: rgba(255, 255, 255, 0.15);
    }
    
    /* Sidebar */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #1C1C1C;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1001;
    }
    
    .sidebar-link {
      padding: 10px 15px;
      text-decoration: none;
      font-size: 1.2em;
      color: #FFE5B4;
      display: block;
      transition: 0.2s;
    }
    
    .sidebar-link:hover {
      background-color: #FFE5B4;
      color: #000000;
    }
    
    /* Episode List - Left Side */
    .episode-list {
      width: 300px;
      background-color: rgba(44, 44, 44, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 15px 0 0 15px;
      padding: 20px;
      height: 80vh;
      overflow-y: auto;
      border-right: 1px solid rgba(255, 229, 180, 0.2);
    }
    
    .episode-list h2 {
      font-size: 1.4em;
      margin-bottom: 20px;
      color: #FFE5B4;
      text-align: center;
    }
    
    .episode-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .episode-list li {
      margin-bottom: 8px;
    }
    
    .episode-list a {
      display: block;
      padding: 10px 14px;
      background-color: rgba(68, 68, 68, 0.6);
      color: #FFE5B4;
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.3s ease;
      font-size: 0.95em;
      border: 1px solid transparent;
    }
    
    .episode-list a:hover {
      background-color: rgba(255, 229, 180, 0.1);
      border-color: #FFE5B4;
      box-shadow: 0 0 20px rgba(255, 229, 180, 0.05);
    }
    
    .episode-list a.watched {
      background-color: rgba(255, 229, 180, 0.3);
    }
    
    .episode-list a.active {
      border-color: #FFE5B4;
      background-color: rgba(255, 229, 180, 0.08);
      box-shadow: 0 0 20px rgba(255, 229, 180, 0.08);
    }
    
    /* Video Player */
    .video-player {
      flex: 1;
      background-color: rgba(44, 44, 44, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 0 15px 15px 0;
      padding: 20px;
    }
    
    .video-player h2 {
      font-size: 1.8em;
      margin-bottom: 20px;
      color: #FFE5B4;
    }
    
    iframe {
      width: 100%;
      height: 70vh;
      border-radius: 10px;
      border: none;
    }
    
    /* Season Section */
    .season-section {
      background-color: rgba(44, 44, 44, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 15px 20px;
      width: 95%;
      margin-top: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 229, 180, 0.05);
    }
    
    .season-info h2 {
      font-size: 1.2em;
      color: #FFE5B4;
      margin-bottom: 6px;
    }
    
    .season-info p {
      font-size: 0.85em;
      color: rgba(255, 229, 180, 0.8);
      margin-bottom: 6px;
    }
    
    .season-info .release-date {
      color: #FFE5B4;
      font-weight: bold;
    }
    
    .server-options h3 {
      font-size: 0.95em;
      color: #FFE5B4;
      margin-bottom: 6px;
    }
    
    .countdown h3 {
      font-size: 0.95em;
      color: #FFE5B4;
      margin-bottom: 6px;
    }
    
    .seasons h3 {
      font-size: 0.95em;
      color: #FFE5B4;
      margin-bottom: 6px;
    }
    
    .server-options button {
      padding: 6px 12px;
      font-size: 0.85em;
      border-radius: 15px;
      background-color: rgba(68, 68, 68, 0.7);
      color: #FFE5B4;
      border: 1px solid rgba(255, 229, 180, 0.2);
      cursor: pointer;
      margin-right: 8px;
      transition: all 0.3s ease;
    }
    
    .server-options button:hover {
      background-color: #FFE5B4;
      color: #000000;
      border-color: #FFE5B4;
    }
    
    .season-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .season {
      background-color: rgba(68, 68, 68, 0.7);
      border-radius: 8px;
      padding: 8px 14px;
      min-width: 80px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }
    
    .season:hover {
      border-color: #FFE5B4;
      box-shadow: 0 0 20px rgba(255, 229, 180, 0.1);
      transform: scale(1.03);
    }
    
    .season h4 {
      font-size: 0.9em;
      color: #FFE5B4;
      margin-bottom: 2px;
    }
    
    .season p {
      font-size: 0.75em;
      color: rgba(255, 229, 180, 0.7);
    }
    
    .season:hover p {
      display: none;
    }
    
    .season.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }
    
    .season.active-season {
      border-color: #FFE5B4;
      background-color: rgba(255, 229, 180, 0.08);
    }
    
    /* Comment Section */
    .comment-section {
      background-color: rgba(44, 44, 44, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 20px;
      width: 95%;
      margin: 20px auto;
      color: #FFE5B4;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 229, 180, 0.05);
    }
    
    .comment-section h2 {
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 229, 180, 0.2);
      padding-bottom: 10px;
    }
    
    .comment-form {
      margin-bottom: 20px;
    }
    
    #comments-container {
      max-height: 400px;
      overflow-y: auto;
      margin-top: 20px;
    }
    
    .comment {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 229, 180, 0.1);
      margin-bottom: 15px;
      display: flex;
      gap: 15px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
    }
    
    .comment-avatar {
      width: 40px;
      height: 40px;
      background-color: #FFE5B4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2C2C2C;
      font-weight: bold;
      font-size: 1.2em;
      flex-shrink: 0;
    }
    
    .comment-content {
      flex: 1;
    }
    
    .comment-header {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 5px;
    }
    
    .comment-user {
      font-weight: bold;
      margin-right: 10px;
    }
    
    .comment-user::before {
      content: "U";
      font-weight: bold;
      margin-right: 5px;
      color: #FFE5B4;
    }
    
    .comment-time {
      font-size: 0.75em;
      color: rgba(255, 229, 180, 0.6);
    }
    
    .comment-text {
      line-height: 1.5;
      font-size: 0.95em;
    }
    
    #comment-input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 229, 180, 0.2);
      background-color: rgba(68, 68, 68, 0.7);
      color: #FFE5B4;
      margin-bottom: 10px;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.3s;
    }
    
    #comment-input:focus {
      border-color: #FFE5B4;
      outline: none;
    }
    
    .comment-btn {
      padding: 8px 20px;
      background-color: #FFE5B4;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .comment-btn:hover {
      background-color: rgba(255, 229, 180, 0.8);
      transform: scale(1.02);
    }

    /* Status Message */
    .status-message {
      text-align: center;
      margin: 10px 0 5px 0;
      color: var(--text-secondary);
      font-style: italic;
      font-size: 0.8em;
      opacity: 0.7;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(44, 44, 44, 0.5);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #FFE5B4;
      border-radius: 10px;
      border: 2px solid rgba(44, 44, 44, 0.5);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #d4b88c;
    }

    /* Responsive */
    @media (max-width: 992px) {
      .container {
        flex-direction: column;
        margin-top: 60px;
      }
      .episode-list {
        width: 100%;
        border-radius: 15px 15px 0 0;
        border-right: none;
        border-bottom: 1px solid rgba(255, 229, 180, 0.2);
        height: 300px;
      }
      .video-player {
        border-radius: 0 0 15px 15px;
      }
      iframe {
        height: 50vh;
      }
      .search-bar {
        width: 120px;
        font-size: 12px;
        padding: 6px 12px;
      }
      .logo-text {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 8px 12px;
      }
      .header-left {
        gap: 8px;
      }
      .search-bar {
        width: 100px;
        font-size: 11px;
        padding: 5px 10px;
      }
      .logo-text {
        font-size: 1rem;
      }
      .video-player h2 {
        font-size: 1.2em;
      }
      iframe {
        height: 40vh;
      }
      .season-section {
        padding: 10px 14px;
      }
      .season-list {
        gap: 6px;
      }
      .season {
        padding: 6px 10px;
        min-width: 60px;
      }
      .comment {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

    <div class="countdown">

    <div class="seasons">

        <!-- Seasons will be dynamically added here -->
      </div>
    </div>
  </div>

  <!-- Comment Section -->

    <h2>Comments</h2>
    
    <div class="comment-form">
      <textarea id="comment-input" placeholder="Add a comment..."></textarea>
      <button class="comment-btn" onclick="postComment()">Post Comment</button>
    </div>
    
    <div id="comments-container">
      <!-- Comments will be loaded here -->
    </div>
  </div>

      }
    };

    function getEpisodeReleaseDate(animeTitle, episodeNum) {
      const animeData = releaseDates[animeTitle];
      if (!animeData) {
        return { date: null, message: 'No release information available for this anime.' };
      }
      
      const { baseDate, interval, episodeCount, unknownMessage } = animeData;
      const releaseDate = new Date(baseDate.getTime() + (episodeNum - 1) * interval * 24 * 60 * 60 * 1000);
      
      if (episodeNum > episodeCount) {
        return { date: null, message: unknownMessage };
      }
      
      return { date: releaseDate, message: null };
    }

    // ----- CORE FUNCTIONS -----
    function getAvatarColor(letter) {
      const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F06292'];
      const charCode = letter.charCodeAt(0);
      return colors[charCode % colors.length];
    }

    let currentEpisodeIndex = 0;
    let countdownInterval = null;

    function loadEpisode(videoFile, episodeTitle, episodeIndex) {
      const videoPlayer = document.getElementById('video-player');
      videoPlayer.src = videoFile;
      document.getElementById('anime-title').textContent = `Now Playing: ${episodeTitle}`;
      markEpisodeAsWatched(episodeTitle);
      
      if (episodeIndex !== undefined) {
        currentEpisodeIndex = episodeIndex;
      }
      
      document.getElementById('current-episode-display').textContent = `You are watching ${episodeTitle}`;
      updateReleaseInfo(currentEpisodeIndex + 1);
      updateActiveEpisode();
    }
    
    function updateActiveEpisode() {
      const links = document.querySelectorAll('.episode-list a');
      links.forEach((link, index) => {
        link.classList.toggle('active', index === currentEpisodeIndex);
      });
    }
    
    function markEpisodeAsWatched(episodeTitle) {
      const watchedEpisodes = JSON.parse(localStorage.getItem('watchedEpisodes') || '[]');
      if (!watchedEpisodes.includes(episodeTitle)) {
        watchedEpisodes.push(episodeTitle);
        localStorage.setItem('watchedEpisodes', JSON.stringify(watchedEpisodes));
      }
      updateEpisodeList();
    }
    
    function updateEpisodeList() {
      const watchedEpisodes = JSON.parse(localStorage.getItem('watchedEpisodes') || '[]');
      const episodeLinks = document.querySelectorAll('.episode-list a');
      episodeLinks.forEach(link => {
        if (watchedEpisodes.includes(link.textContent)) {
          link.classList.add('watched');
        }
      });
    }
    
    function populateEpisodeList(episodes) {
      const episodeList = document.getElementById('episode-list');
      episodeList.innerHTML = '';
      
      episodes.forEach((episode, index) => {
        const listItem = document.createElement('li');
        const link = document.createElement('a');
        link.href = '#';
        link.textContent = episode.title;
        link.onclick = () => loadEpisode(episode.file, episode.title, index);
        listItem.appendChild(link);
        episodeList.appendChild(listItem);
      });
      
      updateEpisodeList();
      if (episodes.length > 0) {
        const firstLink = document.querySelector('.episode-list a');
        if (firstLink) firstLink.classList.add('active');
      }
    }
    
    function changeServer(server) {
      alert(`Switched to ${server.toUpperCase()} server`);
    }

        const formattedDate = releaseDate.toLocaleString('en-US', {
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          timeZoneName: 'short'
        });
        releaseTimeElement.textContent = formattedDate;
        startCountdown(releaseDate, countdownElement);
      } else {
        releaseTimeElement.textContent = result.message || 'No confirmed date yet. Check back for updates!';
        countdownElement.textContent = 'No countdown available';
      }
    }
    
    function startCountdown(targetDate, element) {
      function updateCountdown() {
        const now = new Date().getTime();
        const timeLeft = targetDate.getTime() - now;
        
        if (timeLeft <= 0) {
          element.textContent = '🎉 Episode is now available!';
          return;
        }
        
        const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
        const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
        
        element.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
      }
      
      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    // ----- SEASON FUNCTIONS -----
    function getBaseAnimeName(fullName) {
      return fullName.replace(/\s*(?:season|Season)\s*\d+$/i, '').trim();
    }

    function getAvailableSeasons(baseName) {
      const seasons = [];
      const seasonRegex = new RegExp(`${baseName}\\s*(?:season|Season)?\\s*(\\d+)`, 'i');
      
      for (const animeName in animeEpisodes) {
        if (animeName.startsWith(baseName) || (animeName.toLowerCase().startsWith(baseName.toLowerCase()))) {
          const match = animeName.match(seasonRegex);
          if (match) {
            const seasonNum = parseInt(match[1]);
            seasons.push({
              number: seasonNum,
              fullName: animeName
            });
          } else if (animeName.toLowerCase() === baseName.toLowerCase()) {
            seasons.push({
              number: 1,
              fullName: animeName
            });
          }
        }
      }
      
      seasons.sort((a, b) => a.number - b.number);
      return seasons;
    }

    function createSeasonButtons(baseName, currentSeasonName) {
      const seasonsContainer = document.getElementById('season-list');
      seasonsContainer.innerHTML = '';
      
      const availableSeasons = getAvailableSeasons(baseName);
      
      if (availableSeasons.length <= 1) {
        document.querySelector('.seasons').style.display = 'none';
        return;
      }
      
      document.querySelector('.seasons').style.display = 'block';
      
      availableSeasons.forEach(season => {
        const seasonDiv = document.createElement('div');
        seasonDiv.className = 'season';
        if (season.fullName === currentSeasonName) {
          seasonDiv.classList.add('active-season');
        }
        
        seasonDiv.innerHTML = `
          <h4>Season ${season.number}</h4>
          <p>${animeEpisodes[season.fullName]?.length || 0} Episodes</p>
        `;
        
        seasonDiv.onclick = () => {
          window.location.href = `watch.html?anime=${encodeURIComponent(season.fullName)}`;
        };
        
        seasonsContainer.appendChild(seasonDiv);
      });
    }

    // ----- COMMENT FUNCTIONS -----
    function loadComments() {
      const commentsContainer = document.getElementById('comments-container');
      commentsContainer.innerHTML = '';
      
      const allComments = JSON.parse(localStorage.getItem('animeComments')) || {};
      const animeComments = allComments[animeTitle] || [];
      
      if (animeComments.length === 0) {
        commentsContainer.innerHTML = '<p style="text-align: center; color: rgba(255, 229, 180, 0.7);">No comments yet. Be the first to comment!</p>';
        return;
      }
      
      animeComments.forEach(comment => {
        const username = comment.username || 'Anonymous';
        const firstLetter = username.charAt(0).toUpperCase();
        
        const commentDiv = document.createElement('div');
        commentDiv.className = 'comment';
        
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'comment-avatar';
        avatarDiv.textContent = firstLetter;
        avatarDiv.style.backgroundColor = getAvatarColor(firstLetter);
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'comment-content';
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'comment-header';
        
        const userDiv = document.createElement('span');
        userDiv.className = 'comment-user';
        userDiv.textContent = username;
        
        const timeDiv = document.createElement('span');
        timeDiv.className = 'comment-time';
        timeDiv.textContent = new Date(comment.timestamp).toLocaleString();
        
        const textDiv = document.createElement('div');
        textDiv.className = 'comment-text';
        textDiv.textContent = comment.text;
        
        headerDiv.appendChild(userDiv);
        headerDiv.appendChild(timeDiv);
        contentDiv.appendChild(headerDiv);
        contentDiv.appendChild(textDiv);
        commentDiv.appendChild(avatarDiv);
        commentDiv.appendChild(contentDiv);
        
        commentsContainer.appendChild(commentDiv);
      });
    }

    function postComment() {
      const commentInput = document.getElementById('comment-input');
      const commentText = commentInput.value.trim();
      
      if (!commentText) {
        alert('Please enter a comment before posting');
        return;
      }
      
      const username = localStorage.getItem('currentUser') || 'Anonymous';
      const allComments = JSON.parse(localStorage.getItem('animeComments')) || {};
      const animeComments = allComments[animeTitle] || [];
      
      animeComments.push({
        username: username,
        text: commentText,
        timestamp: new Date().toISOString()
      });
      
      allComments[animeTitle] = animeComments;
      localStorage.setItem('animeComments', JSON.stringify(allComments));
      
      commentInput.value = '';
      loadComments();
    }

    // ----- SIDEBAR FUNCTIONS -----
    function openSidebar() {
      document.getElementById('sidebar').style.width = '250px';
    }
    
    function closeSidebar() {
      document.getElementById('sidebar').style.width = '0';
    }
    
    document.querySelector('.settings-button').addEventListener('click', openSidebar);
    
    document.addEventListener('click', (event) => {
      const sidebar = document.getElementById('sidebar');
      const settingsButton = document.querySelector('.settings-button');
      if (!sidebar.contains(event.target) && !settingsButton.contains(event.target)) {
        closeSidebar();
      }
    });

    // ----- HEADER SCROLL EFFECT -----
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });

    // ----- INITIALIZATION -----
    const urlParams = new URLSearchParams(window.location.search);
    let animeTitle = decodeURIComponent(urlParams.get('anime'));
    console.log('Anime Title:', animeTitle);

    if (!localStorage.getItem('currentUser')) {
      const randomUser = 'User' + Math.floor(Math.random() * 1000);
      localStorage.setItem('currentUser', randomUser);
    }
    
    if (animeTitle && animeEpisodes[animeTitle]) {
      console.log('Episodes found for:', animeTitle);
      const baseAnimeName = getBaseAnimeName(animeTitle);
      createSeasonButtons(baseAnimeName, animeTitle);
      populateEpisodeList(animeEpisodes[animeTitle]);
      
      if (animeEpisodes[animeTitle].length > 0) {
        const firstEpisode = animeEpisodes[animeTitle][0];
        loadEpisode(firstEpisode.file, firstEpisode.title, 0);
        updateReleaseInfo(1);
      }
      
      loadComments();
    } else {
      console.error('Anime not found:', animeTitle);
      document.getElementById('anime-title').textContent = 'Anime not found!';
    }

    document.addEventListener('DOMContentLoaded', loadComments);
  </script>
</body>
